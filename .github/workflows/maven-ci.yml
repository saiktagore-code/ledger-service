name: Maven CI

on:
  workflow_dispatch:

jobs:
  local-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - name: Run all Maven checks
        run: |
          cd gateway-service && mvn -B clean verify
          cd ../account-service && mvn -B clean verify
