name: SonarQube

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  id-token: write

jobs:
  sonar:
    name: SonarQube Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - name: Cache Sonar packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
      - name: Build and analyze
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          cd gateway-service
          mvn -B clean verify sonar:sonar -Dsonar.projectKey=event-ledger-gateway -Dsonar.host.url=https://sonarcloud.io -Dsonar.login=${SONAR_TOKEN}
          cd ../account-service
          mvn -B clean verify sonar:sonar -Dsonar.projectKey=event-ledger-account -Dsonar.host.url=https://sonarcloud.io -Dsonar.login=${SONAR_TOKEN}
