server:
  port: 8081
spring:
  datasource:
    url: jdbc:h2:mem:accountdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always
resilience4j:
  retry:
    instances:
      default:
        maxAttempts: 1
        waitDuration: 0ms
otel:
  traces:
    exporter:
      logging:
        enabled: true
