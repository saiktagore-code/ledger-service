version: '3.9'
services:
  gateway:
    build:
      context: ./gateway-service
    ports:
      - 8080:8080
    environment:
      - SPRING_PROFILES_ACTIVE=default
      - ACCOUNT_SERVICE_BASE_URL=http://account-service:8081
      - ACCOUNT_SERVICE_API_KEY=${ACCOUNT_SERVICE_API_KEY}
    depends_on:
      account-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/8080' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
  account-service:
    build:
      context: ./account-service
    ports:
      - 8081:8081
    environment:
      - SPRING_PROFILES_ACTIVE=default
      - INTERNAL_API_KEY=${ACCOUNT_SERVICE_API_KEY}
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/8081' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
