server:
  port: 8080
spring:
  datasource:
    url: jdbc:h2:mem:gatewaydb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always
resilience4j:
  circuitbreaker:
    instances:
      accountServiceCircuitBreaker:
        registerHealthIndicator: true
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 2
  retry:
    instances:
      accountServiceRetry:
        maxAttempts: 3
        waitDuration: 200ms
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2
        enableRandomizedWait: true
        randomizedWaitFactor: 0.5
        retryExceptions:
          - com.eventledger.gateway.exception.AccountServiceException
          - org.springframework.web.client.ResourceAccessException
          - org.springframework.web.client.HttpServerErrorException$BadGateway
          - org.springframework.web.client.HttpServerErrorException$ServiceUnavailable
          - org.springframework.web.client.HttpServerErrorException$GatewayTimeout
        ignoreExceptions:
          - org.springframework.web.client.HttpClientErrorException
otel:
  traces:
    exporter:
      logging:
        enabled: true
